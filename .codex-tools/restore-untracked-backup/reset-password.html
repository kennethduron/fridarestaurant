<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frida Restaurant | Restablecer contraseña</title>
    <meta name="description" content="Restablece la contraseña del CRM de Frida Restaurant y vuelve a iniciar sesión.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260419m">
    <link rel="icon" type="image/jpeg" href="assets/icon.jpg">
    <link rel="shortcut icon" href="assets/icon.jpg">
    <link rel="apple-touch-icon" href="assets/icon.jpg">
</head>

<body class="crm-page">
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="brand" href="index.html">Frida Restaurant</a>
            <a class="btn btn-outline" href="crm.html">Ir al CRM</a>
        </div>
    </header>

    <main class="container section">
        <section class="auth-gate">
            <h1>Restablecer contraseña</h1>
            <p id="resetIntro" class="muted-line">
                Usa el enlace más reciente que llegó a tu correo y define una nueva contraseña para entrar al CRM.
            </p>

            <form id="resetPasswordForm" class="reservation-form hidden" novalidate>
                <label class="full">
                    <span>Nueva contraseña</span>
                    <input id="resetPassword" type="password" autocomplete="new-password" minlength="6" required>
                </label>
                <label class="full">
                    <span>Confirmar contraseña</span>
                    <input id="resetPasswordConfirm" type="password" autocomplete="new-password" minlength="6" required>
                </label>
                <div class="full">
                    <button id="resetPasswordSubmit" type="submit" class="btn btn-primary">Guardar contraseña</button>
                </div>
            </form>

            <p id="resetMessage" class="muted-line"></p>
            <p class="muted-line">
                Después del cambio podrás entrar en <a href="crm.html">crm.html</a> con tu correo o usuario.
            </p>
        </section>
    </main>

    <script type="module" src="js/reset-password.js?v=20260420a"></script>
</body>

</html>
